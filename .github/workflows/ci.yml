name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Ruff format
        run: uvx ruff format --check .
      - name: Ruff lint
        run: uvx ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          # Current Home Assistant needs Python 3.13+; without this uv picks the
          # 3.12 floor and resolves an HA too old for the APIs the flow uses.
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest
